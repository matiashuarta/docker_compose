name: CI

on:
  push:
    branches: ["**"]       # corre en cualquier push a cualquier rama
  pull_request:
    branches: [dev]        # corre en cualquier PR hacia dev

jobs:
  test:
    runs-on: ubuntu-latest

    steps:

      # 1. Bajar el codigo del repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configurar Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3. Instalar dependencias del backend + herramientas de CI
      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio httpx ruff

      # 4. Linting con ruff (verifica estilo y errores comunes)
      - name: Lint with ruff
        run: ruff check backend/

      # 5. Correr los tests
      - name: Run tests
        run: pytest backend/tests/ -v
