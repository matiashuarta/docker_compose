version: '3.9'

# Swarm stack file — deploy with:
#   docker stack deploy -c docker-compose.swarm.yml app
#
# differences from docker-compose.prod.yml:
#   - networks use driver: overlay so containers can talk across different nodes
#   - each service has a deploy: block for replicas and restart policy

services:

  frontend:
    image: ghcr.io/${GITHUB_USER}/${GITHUB_REPO}-frontend:latest
    ports:
      - "${FRONTEND_PORT}:80"
    environment:
      - BACKEND_HOST=backend  # Swarm overlay DNS resolves this to the backend service
    depends_on:
      - backend
    networks:
      - frontend_net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  backend:
    image: ghcr.io/${GITHUB_USER}/${GITHUB_REPO}-backend:latest
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      - db
    networks:
      - frontend_net
      - backend_net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - backend_net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager  # DB stays on the manager node so the volume is always accessible
      restart_policy:
        condition: on-failure

networks:
  frontend_net:
    driver: overlay  # overlay allows cross-node communication between containers
  backend_net:
    driver: overlay

volumes:
  pg_data:
