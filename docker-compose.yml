version: '3.9'

services:

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT}:80"   # unico puerto expuesto al exterior
    depends_on:
      - backend
    networks:
      - frontend_net

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      - db
    networks:
      - frontend_net
      - backend_net
    restart: on-failure

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - backend_net

networks:
  frontend_net:
  backend_net:

volumes:
  pg_data:
