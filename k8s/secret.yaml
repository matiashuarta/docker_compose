# secret.yaml: stores sensitive values like the database connection string
# equivalent to the hardcoded DATABASE_URL in the ECS task definition
#
# IMPORTANT: after `terraform apply`, run:
#   terraform -chdir=terraform-eks output rds_endpoint
# then replace docker-compose-app-db.cozkwuws0ghp.us-east-1.rds.amazonaws.com below with that value before running kubectl apply
apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  namespace: app
type: Opaque
stringData:
  database-url: "postgresql://app:secret123@<RDS_ENDPOINT>:5432/tasksdb"
